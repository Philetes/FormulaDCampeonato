<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Campeonato FormulaD - Paddock OS</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #161616;
            --red: #ef4444;
            --white: #f9f9f9;
            --green: #22c55e;
            --blue: #3b82f6;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 230px;
            background: #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #222;
        }

        .logo {
            color: var(--red);
            font-weight: 900;
            font-size: 24px;
            margin-bottom: 30px;
            font-style: italic;
            letter-spacing: -1px;
        }

        .nav {
            padding: 15px;
            border: none;
            background: none;
            color: #888;
            text-align: left;
            cursor: pointer;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        .nav:hover, .nav.active {
            background: #222;
            color: white;
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        /* SECTIONS */
        .section {
            display: none;
            animation: fade .4s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(10px) }
            to { opacity: 1; transform: translateY(0) }
        }

        /* CARDS */
        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: #666;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            padding: 10px;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #222;
        }

        .team-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-logo {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }

        /* ECONOMY & IMPROVEMENTS */
        .pos { color: var(--green); font-weight: bold; }
        .neg { color: var(--red); font-weight: bold; }
        .stat-row { display: flex; justify-content: space-between; margin-top: 10px; font-size: 14px; color: #aaa; }
        .val-ingreso { color: var(--green); font-weight: bold; }
        .val-gasto { color: var(--red); font-weight: bold; }
        
        .improvements-list {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #333;
        }
        .improvement-tag {
            display: inline-block;
            background: #222;
            color: var(--blue);
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            border: 1px solid #333;
        }

        /* WINNER CARD */
        .winner-box {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            background: linear-gradient(90deg, #1a1a1a 0%, #000 100%);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #ffd700;
        }
        .winner-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
            border: 2px solid #444;
        }

        .team-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
        }

        /* CHART */
        .chart-container {
            width: 100%;
            overflow-x: auto;
            background: #111;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            position: relative;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        /* TOOLTIP */
        #chartTooltip {
            position: fixed;
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 10000;
            border: 1px solid var(--red);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* LOADER */
        .loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: black;
            z-index: 1000;
        }
    </style>
</head>

<body>

<div id="chartTooltip"></div>

<div class="loader" id="loader">
    <div style="color: var(--red); font-weight: 900; margin-bottom: 10px;">FD CAMPEONATO</div>
    <div>Sincronizando telemetría...</div>
</div>

<div class="sidebar">
    <div class="logo">FormulaD</div>
    <button class="nav active" onclick="show('dash', this)">🏁 Inicio</button>
    <button class="nav" onclick="show('drivers', this)">👨‍✈️ Pilotos</button>
    <button class="nav" onclick="show('teams', this)">🏎 Equipos</button>
    <button class="nav" onclick="show('economy', this)">💰 Economía</button>
    <button class="nav" onclick="show('chart', this)">📈 Rendimiento</button>
</div>

<div class="main">
    <div id="dash" class="section active">
        <h1 style="font-style: italic; font-weight: 900; font-size: 40px;">INICIO</h1>
        <div class="card">
            <h2 id="gp" style="margin:0; color:var(--red)"></h2>
            <p id="circuit" style="font-size: 20px; margin: 10px 0;"></p>
            <p id="date" style="color: #888;"></p>
            <div id="countdown" style="background: #222; display: inline-block; padding: 10px 20px; border-radius: 10px; font-weight: bold;"></div>
            
            <div id="lastWinnerContainer"></div>
        </div>
    </div>

    <div id="drivers" class="section">
        <h1>POSICIONES PILOTOS</h1>
        <div class="card">
            <table>
                <thead>
                    <tr><th>#</th><th>Piloto</th><th>Equipo</th><th>Puntos</th></tr>
                </thead>
                <tbody id="driversTable"></tbody>
            </table>
        </div>
    </div>

    <div id="teams" class="section">
        <h1>CONSTRUCTORES</h1>
        <div class="card">
            <table>
                <thead>
                    <tr><th>Equipo</th><th>Puntos</th></tr>
                </thead>
                <tbody id="teamsTable"></tbody>
            </table>
        </div>
    </div>

    <div id="economy" class="section">
        <h1>ESTADO FINANCIERO Y MEJORAS</h1>
        <div id="economyGrid" class="grid"></div>
    </div>

    <div id="chart" class="section">
        <h1>TELEMETRÍA DE RENDIMIENTO</h1>
        
        <h2 style="font-size: 18px; color: var(--red); margin-bottom: 10px;">HISTÓRICO PILOTOS</h2>
        <div class="chart-container">
            <canvas id="driversChart" width="1000" height="400"></canvas>
        </div>

        <h2 style="font-size: 18px; color: var(--red); margin-bottom: 10px;">HISTÓRICO EQUIPOS</h2>
        <div class="chart-container">
            <canvas id="teamsChart" width="1000" height="400"></canvas>
        </div>
    </div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTYnG-fS8aDqWYWFtHjXeFY2genYwbZx5FFVSJKk3BNXLuvun60JDpZFhnZ1Fm40R9LddSXphP-F7rf/pub?gid=1288159029&single=true&output=csv";

let headers = [];
let rows = [];
let chartDataPoints = []; 

function getTeamColor(teamName) {
    if (!teamName) return "#ffffff";
    const name = teamName.toLowerCase();
    if (name.includes("rosso") || name.includes("porco") || name.includes("ferrari")) return "#ef4444";
    if (name.includes("papaya") || name.includes("mclaren")) return "#ff8700";
    if (name.includes("dinoco") || name.includes("red bull") || name.includes("oracle")) return "#0600ef";
    if (name.includes("aston") || name.includes("amr")) return "#005f50";
    if (name.includes("haas")) return "#ffffff";
    if (name.includes("mercedes")) return "#00d2be";
    if (name.includes("alpine")) return "#0090ff";
    if (name.includes("williams")) return "#005aff";
    if (name.includes("sauber") || name.includes("stake")) return "#52e252";
    return `hsl(${Math.abs(teamName.length * 40) % 360}, 70%, 50%)`;
}

function show(id, btn) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll(".nav").forEach(b => b.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    btn.classList.add("active");
}

function parseNum(val) {
    if (!val || val.trim() === "" || val === "0") return 0;
    return parseFloat(val.replace(/[^0-9,.-]/g, '').replace(',', '.')) || 0;
}

async function load() {
    try {
        const res = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await res.text();
        const allData = text.split(/\r?\n/).map(line => line.split(","));
        headers = allData[0].map(h => h.trim());
        rows = allData.slice(1).filter(r => r[col("Piloto")] && r[col("Piloto")].trim() !== "" && r[col("Piloto")] !== "0");
        render();
        document.getElementById("loader").style.display = "none";
    } catch (e) {
        console.error("Error cargando datos:", e);
        document.getElementById("loader").innerText = "Error de conexión.";
    }
}

function col(name) {
    return headers.indexOf(name);
}

function renderDashboard() {
    let r = rows.find(row => row[col("GP en curso")] && row[col("GP en curso")] !== "0") || rows[0];
    document.getElementById("gp").innerText = r[col("GP en curso")] || "Sin GP activo";
    document.getElementById("circuit").innerText = r[col("Circuito")] || "TBD";
    document.getElementById("date").innerText = r[col("Fecha")] || "";
    
    if (r[col("Fecha")]) {
        let raceDate = new Date(r[col("Fecha")]);
        let today = new Date();
        let diff = Math.ceil((raceDate - today) / (1000 * 60 * 60 * 24));
        document.getElementById("countdown").innerText = diff > 0 ? `FALTAN ${diff} DÍAS` : "¡SEMANA DE CARRERA!";
    }

    // Ganador anterior
    const startIndex = col("Australia");
    const raceCols = headers.slice(startIndex, 36).filter(h => h && h !== "" && h !== "0");
    
    // Buscar la última carrera que tiene datos (puntos sumados > 0)
    let lastRaceIndex = -1;
    for(let i = raceCols.length - 1; i >= 0; i--) {
        let hasData = rows.some(row => parseNum(row[col(raceCols[i])]) > 0);
        if(hasData) {
            lastRaceIndex = i;
            break;
        }
    }

    if(lastRaceIndex !== -1) {
        let raceName = raceCols[lastRaceIndex];
        let winnerRow = [...rows].sort((a,b) => parseNum(b[col(raceName)]) - parseNum(a[col(raceName)]))[0];
        
        document.getElementById("lastWinnerContainer").innerHTML = `
            <div class="winner-box">
                <img src="pilotos/${winnerRow[col("Piloto")]}.png" class="winner-img" onerror="this.src='https://via.placeholder.com/80?text=F1'">
                <div>
                    <div style="font-size: 12px; color: #ffd700; font-weight: bold; text-transform: uppercase;">Ganador Anterior: ${raceName}</div>
                    <div style="font-size: 24px; font-weight: 900; font-style: italic;">${winnerRow[col("Piloto")]}</div>
                    <div style="color: #888; font-size: 14px;">${winnerRow[col("Escuderia")]}</div>
                </div>
            </div>
        `;
    }
}

function renderDrivers() {
    let sorted = [...rows].sort((a, b) => parseNum(b[col("Total Puntos")]) - parseNum(a[col("Total Puntos")]));
    let html = "";
    sorted.forEach((r, i) => {
        let medal = i < 3 ? ["🥇", "🥈", "🥉"][i] : i + 1;
        let teamName = r[col("Escuderia")];
        html += `
            <tr>
                <td>${medal}</td>
                <td style="font-weight:bold">${r[col("Piloto")]}</td>
                <td>
                    <div class="team-row">
                        <img class="team-logo" src="equipos/${teamName}.png" onerror="this.style.display='none'">
                        ${teamName}
                    </div>
                </td>
                <td style="color:var(--red); font-weight:900">${r[col("Total Puntos")]}</td>
            </tr>`;
    });
    document.getElementById("driversTable").innerHTML = html;
}

function renderTeams() {
    let map = {};
    rows.forEach(r => {
        let team = r[col("Equipo")];
        if (team && team.trim() !== "" && team !== "0") {
            map[team] = parseNum(r[col("Puntos Equipo")]);
        }
    });
    let html = "";
    Object.entries(map).sort((a, b) => b[1] - a[1]).forEach(t => {
        html += `
            <tr>
                <td>
                    <div class="team-row">
                        <img class="team-logo" src="equipos/${t[0]}.png" onerror="this.style.display='none'">
                        <span style="font-weight:bold">${t[0]}</span>
                    </div>
                </td>
                <td style="font-weight:900">${t[1]}</td>
            </tr>`;
    });
    document.getElementById("teamsTable").innerHTML = html;
}

function renderEconomy() {
    let map = {};
    // Identificar columnas de mejoras
    const improvementCols = headers.filter(h => h.toLowerCase().includes("mejora"));

    rows.forEach(r => {
        let team = r[col("Equipo")];
        if (team && team.trim() !== "" && team !== "0" && !map[team]) {
            // Recopilar mejoras activas
            let activeImprovements = [];
            improvementCols.forEach(c => {
                let val = r[col(c)];
                if(val && val.trim() !== "" && val !== "0" && val.toLowerCase() !== "no") {
                    activeImprovements.push(val);
                }
            });

            map[team] = {
                name: team,
                saldo: parseNum(r[col("Saldo actual")]),
                gastos: parseNum(r[col("Gastos")]),
                ingresos: parseNum(r[col("Ingresos")]),
                mejoras: activeImprovements
            };
        }
    });

    let html = "";
    // Ordenar por saldo descendente
    Object.values(map).sort((a, b) => b.saldo - a.saldo).forEach((data) => {
        const color = getTeamColor(data.name);
        let improvementsHtml = data.mejoras.length > 0 
            ? `<div class="improvements-list">
                <div style="font-size: 10px; color: #666; margin-bottom: 5px; text-transform: uppercase;">Mejoras Instaladas:</div>
                ${data.mejoras.map(m => `<span class="improvement-tag">${m}</span>`).join('')}
               </div>` 
            : "";

        html += `
            <div class="card">
                <div class="team-border" style="background-color: ${color}"></div>
                <div class="team-row" style="margin-bottom: 15px;">
                    <img class="team-logo" src="equipos/${data.name}.png" onerror="this.style.display='none'">
                    <h3 style="margin:0">${data.name}</h3>
                </div>
                <div style="font-size:24px" class="${data.saldo >= 0 ? 'pos' : 'neg'}">
                    $${data.saldo}M
                </div>
                <div class="stat-row">
                    <span>Ingresos:</span>
                    <span class="val-ingreso">+$${data.ingresos}M</span>
                </div>
                <div class="stat-row">
                    <span>Gastos:</span>
                    <span class="val-gasto">-$${data.gastos}M</span>
                </div>
                ${improvementsHtml}
            </div>`;
    });
    document.getElementById("economyGrid").innerHTML = html;
}

function drawChart(canvasId, items, isDrivers = true) {
    const canvas = document.getElementById(canvasId);
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const startIndex = col("Australia");
    const raceCols = headers.slice(startIndex, 36).filter(h => h && h !== "" && h !== "0");
    const margin = 60;
    const spacing = 75; 
    
    canvas.width = margin + (raceCols.length * spacing) + 50;

    // Grid y etiquetas
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 1;
    ctx.font = "10px sans-serif";
    ctx.fillStyle = "#888";

    raceCols.forEach((gpName, i) => {
        let x = margin + (i * spacing);
        ctx.beginPath();
        ctx.moveTo(x, 20);
        ctx.lineTo(x, 350);
        ctx.stroke();
        ctx.save();
        ctx.translate(x, 365);
        ctx.rotate(-Math.PI / 4);
        ctx.fillText(gpName, 0, 0);
        ctx.restore();
    });

    const maxVal = isDrivers ? 50 : 100;

    for(let i=0; i<=5; i++){
        let pLabel = Math.round(i * (maxVal / 5));
        let y = 350 - (i/5 * 330);
        ctx.beginPath();
        ctx.moveTo(margin, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
        ctx.fillText(pLabel + " pts", 10, y + 3);
    }

    items.forEach((item, idx) => {
        let points = [];
        const label = isDrivers ? item[col("Piloto")] : item.teamName;
        const teamName = isDrivers ? item[col("Escuderia")] : item.teamName;
        const color = getTeamColor(teamName);

        raceCols.forEach(gp => {
            if (isDrivers) {
                points.push(parseNum(item[col(gp)]));
            } else {
                let sum = rows
                    .filter(r => r[col("Equipo")] === item.teamName)
                    .reduce((acc, curr) => acc + parseNum(curr[col(gp)]), 0);
                points.push(sum);
            }
        });

        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";

        points.forEach((p, k) => {
            let x = margin + (k * spacing);
            let y = 350 - (p/maxVal * 330);
            if(k === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
            
            chartDataPoints.push({ canvasId, x, y, label, gp: raceCols[k], pts: p });

            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.stroke();

        ctx.fillStyle = color;
        ctx.font = "bold 11px sans-serif";
        let lastX = margin + (points.length - 1) * spacing;
        let lastY = 350 - (points[points.length-1]/maxVal * 330);
        ctx.fillText(label, lastX + 10, lastY + 4);
    });

    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;
        const tooltip = document.getElementById("chartTooltip");
        
        const hit = chartDataPoints.find(p => 
            p.canvasId === canvasId && 
            Math.abs(p.x - mouseX) < 10 && 
            Math.abs(p.y - mouseY) < 10
        );

        if (hit) {
            tooltip.style.display = "block";
            tooltip.style.left = (e.clientX + 10) + "px";
            tooltip.style.top = (e.clientY + 10) + "px";
            tooltip.innerHTML = `<strong>${hit.label}</strong><br>${hit.gp}: ${hit.pts} pts`;
        } else {
            tooltip.style.display = "none";
        }
    });
}

function renderChart() {
    chartDataPoints = []; 
    drawChart("driversChart", rows, true);
    let uniqueTeamsNames = [...new Set(rows.map(r => r[col("Equipo")]))].filter(t => t && t !== "0");
    let teamsData = uniqueTeamsNames.map(tName => ({ teamName: tName }));
    drawChart("teamsChart", teamsData, false);
}

function render() {
    renderDashboard();
    renderDrivers();
    renderTeams();
    renderEconomy();
    renderChart();
}

load();
</script>

</body>
</html>
